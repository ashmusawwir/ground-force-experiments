<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXP-009: Directed Day Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <style>/* __CSS__ */</style>
</head>
<body>
    <div class="container">
        <h1>EXP-009: Directed Day</h1>
        <div class="subtitle">Structured ambassador task lists — geo-clustered visits with clear objectives</div>

        <!-- Card 1: Pool Overview -->
        <div class="card card-full" id="card-pool">
            <h2><span class="num">1</span> Target Pools</h2>
            <div class="stat-grid stat-grid-5" id="pool-stats"></div>
            <div id="pool-table-container"></div>
        </div>

        <!-- Card 2: Zone Map -->
        <div class="card card-full" id="card-zones">
            <h2><span class="num">2</span> Geographic Zones</h2>
            <div class="zone-legend" id="zone-legend"></div>
            <div class="map-container" id="zone-map"></div>
            <div id="zone-table-container" style="margin-top: 1rem;"></div>
        </div>

        <!-- Card 3: Daily Routes -->
        <div class="card card-full" id="card-routes">
            <h2><span class="num">3</span> Daily Routes</h2>
            <div id="routes-container"></div>
        </div>

        <!-- Card 4: Outcome Tracking -->
        <div class="card card-full" id="card-outcomes">
            <h2><span class="num">4</span> Outcome Tracking</h2>
            <div class="stat-grid" id="outcome-stats"></div>
            <div id="outcome-table-container"></div>
            <div class="insight" id="outcome-insight" style="display: none;"></div>
        </div>
    </div>

    <script>// __DATA__</script>
    <script>// __APP__</script>
</body>
</html>
